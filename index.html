<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clutter Byte — Estate Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    /* Fill the full viewport height without scrolling */
    html, body {
      height: 100%;
      /* allow scroll only if content truly overflows on very small devices */
      overflow-y: auto;
    }
    body {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>

  <main class="lang-wrap">
    <div class="lang-brand">
      <div class="lang-diamond"></div>
      <span class="lang-name">Clutter Byte</span>
      <span class="lang-tagline">Estate Sale &nbsp;·&nbsp; Inland Empire</span>
    </div>
    <nav class="lang-grid" aria-label="Language selection">
      <a href="home.html" class="lang-card" id="card-en">
        <span class="lang-arrow" aria-hidden="true">↗</span>
        <span class="lang-label">English</span>
        <span class="lang-hint">Continue in English</span>
      </a>
      <a href="home-es.html" class="lang-card" id="card-es">
        <span class="lang-arrow" aria-hidden="true">↗</span>
        <span class="lang-label">Español</span>
        <span class="lang-hint">Continuar en Español</span>
      </a>
    </nav>
  </main>

  <footer class="lang-footer-bar">© Clutter Byte</footer>

  <script>
    try {
      var saved = localStorage.getItem('cb-lang');
      if (saved === 'en') location.replace('home.html');
      if (saved === 'es') location.replace('home-es.html');
    } catch(e) {}
    document.getElementById('card-en').addEventListener('click', function () {
      try { localStorage.setItem('cb-lang', 'en'); } catch(e) {}
    });
    document.getElementById('card-es').addEventListener('click', function () {
      try { localStorage.setItem('cb-lang', 'es'); } catch(e) {}
    });
  </script>

</body>
</html>
